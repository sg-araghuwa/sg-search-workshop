<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="container">
    <h1>Search App</h1>

    <section class="glass-panel" id="search-panel">
      <form id="search-form" class="search-form" autocomplete="off">
        <div class="form-group">
          <div class="label-row">
            <label for="firstName">First Name</label>
            <span id="firstName-char-hint" class="char-count-hint" role="tooltip">0 / 50</span>
          </div>
          <input
            type="text"
            id="firstName"
            name="firstName"
            maxlength="50"
            placeholder="First Name"
            aria-describedby="firstName-char-hint"
          >
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            placeholder="Last Name"
          >
        </div>
        <div class="button-group">
          <button type="submit" id="btn-search" class="btn-search">Search</button>
          <button type="button" id="btn-clear" class="btn-clear">Clear</button>
        </div>
      </form>
    </section>

    <p id="status" class="status-area" role="status" aria-live="polite">Enter a name to begin searching.</p>

    <section class="glass-panel results-panel" id="results-panel" hidden>
      <table class="results-table">
        <thead>
          <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
