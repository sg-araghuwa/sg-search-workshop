<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okta Sign-In — Glass Landscape — AI_POC_Lab4</title>
  <!-- Spine: DESIGN.md glass-login-card, underline-input, primary-button; EXPERIENCE.md IA -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #b8d4e8 0%, #7eb3d4 45%, #5a9bb8 100%);
      position: relative;
      overflow: hidden;
    }

    .landscape {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .landscape::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: #fff;
      border-radius: 50%;
      top: 12%;
      left: 18%;
      opacity: 0.95;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(180deg, transparent 0%, #3d7fa3 35%, #214d72 100%);
      clip-path: polygon(0 100%, 0 55%, 15% 30%, 28% 50%, 42% 25%, 58% 45%, 72% 20%, 88% 42%, 100% 28%, 100% 100%);
    }

    .mountain-mid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 42%;
      background: linear-gradient(180deg, transparent, #5a9bb8 60%, #3d7fa3 100%);
      clip-path: polygon(0 100%, 0 70%, 20% 45%, 35% 60%, 50% 40%, 65% 55%, 80% 38%, 100% 58%, 100% 100%);
      opacity: 0.85;
    }

    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28%;
      background: #1a3344;
      clip-path: polygon(0 100%, 0 75%, 5% 55%, 8% 75%, 12% 50%, 16% 75%, 22% 45%, 26% 75%, 0 75%, 100% 75%, 96% 50%, 92% 72%, 88% 48%, 84% 70%, 78% 42%, 74% 68%, 100% 75%, 100% 100%);
    }

    .variants {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .variant-label {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.9);
      margin-bottom: 12px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .glass-login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(33, 77, 114, 0.2);
    }

    .card-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .underline-field {
      margin-bottom: 20px;
    }

    .underline-field label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .underline-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(26, 26, 26, 0.35);
      min-height: 36px;
    }

    .underline-row input {
      flex: 1;
      border: none;
      background: transparent;
      font: inherit;
      padding: 6px 0;
      outline: none;
    }

    .field-icon {
      color: #4a5568;
      font-size: 16px;
      padding-left: 8px;
    }

    .forgot-row {
      text-align: right;
      margin: -8px 0 16px;
    }

    .forgot-row a {
      font-size: 13px;
      color: #214d72;
      text-decoration: none;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .remember-row input {
      width: 16px;
      height: 16px;
      accent-color: #214d72;
    }

    .btn-gradient {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(90deg, #214d72 0%, #6eb5d8 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      font-size: 14px;
    }

    .card-footer a {
      color: #214d72;
      font-weight: 700;
      text-decoration: none;
    }

    .sign-in-lead {
      text-align: center;
      font-size: 14px;
      color: #4a5568;
      margin-bottom: 24px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="landscape" aria-hidden="true">
    <div class="mountain-mid"></div>
    <div class="mountain"></div>
    <div class="trees"></div>
  </div>

  <div class="variants">
    <div>
      <div class="variant-label">Okta Hosted Sign-In Page</div>
      <div class="glass-login-card">
        <h1 class="card-title">Login</h1>
        <div class="underline-field">
          <label for="email">Email</label>
          <div class="underline-row">
            <input id="email" type="email" autocomplete="username">
            <span class="field-icon" aria-hidden="true">✉</span>
          </div>
        </div>
        <div class="underline-field">
          <label for="password">Password</label>
          <div class="underline-row">
            <input id="password" type="password" autocomplete="current-password">
            <span class="field-icon" aria-hidden="true">👁</span>
          </div>
        </div>
        <div class="forgot-row"><a href="#">Forgot Password?</a></div>
        <label class="remember-row"><input type="checkbox"> Remember Me</label>
        <button type="button" class="btn-gradient">Secure sign in</button>
        <div class="card-footer">
          <span>Don't have an Account?</span>
          <a href="#">Register</a>
        </div>
      </div>
    </div>

    <div>
      <div class="variant-label">Local Sign-In Surface</div>
      <div class="glass-login-card">
        <h1 class="card-title">Sign In</h1>
        <p class="sign-in-lead">Sign in to access the employee search lab.</p>
        <button type="button" class="btn-gradient">Sign In with Okta</button>
      </div>
    </div>
  </div>
</body>
</html>
