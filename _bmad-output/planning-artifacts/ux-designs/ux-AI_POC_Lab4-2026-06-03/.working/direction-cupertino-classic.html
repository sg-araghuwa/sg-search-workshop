<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search App - Cupertino Classic</title>
    <style>
        /* 
           Rationale: "Cupertino Classic"
           - Inspired by Apple's main website and macOS system interfaces.
           - Focuses on clarity, high legibility, and a sense of openness.
           - Uses a strict white/light gray palette with the iconic Apple Blue for actions.
           
           Hex Values:
           - Background: #FFFFFF (Pure White)
           - Text (Primary): #1D1D1F (Apple Black)
           - Text (Secondary): #86868B (Apple Gray)
           - Border: #D2D2D7 (Light Gray)
           - Accent/Button: #0066CC (Apple Blue)
           - Button Hover: #0077ED
           - Table Header: #F5F5F7 (Off-white)
        */

        :root {
            --bg-color: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --border-color: #D2D2D7;
            --accent-color: #0066CC;
            --accent-hover: #0077ED;
            --table-header-bg: #F5F5F7;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 40px;
            text-align: center;
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 30px;
            padding: 30px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            padding: 12px 16px;
            font-size: 17px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            font-size: 17px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-search {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-search:hover {
            background-color: var(--accent-hover);
        }

        .btn-clear {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .btn-clear:hover {
            background-color: rgba(0, 102, 204, 0.05);
        }

        .status-area {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            min-height: 20px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .results-table th {
            background-color: var(--table-header-bg);
            text-align: left;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .results-table td {
            padding: 16px;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover {
            background-color: #FBFBFD;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Search App</h1>
        
        <div class="search-form">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>
            <div class="button-group">
                <button class="btn-search">Search</button>
                <button class="btn-clear">Clear</button>
            </div>
        </div>

        <div class="status-area">
            Found 3 results
        </div>

        <table class="results-table">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John</td>
                    <td>Appleseed</td>
                    <td>john@apple.com</td>
                    <td>Design</td>
                    <td>Cupertino</td>
                </tr>
                <tr>
                    <td>Jane</td>
                    <td>Doe</td>
                    <td>jane@example.com</td>
                    <td>Engineering</td>
                    <td>San Francisco</td>
                </tr>
                <tr>
                    <td>Craig</td>
                    <td>Federighi</td>
                    <td>hairforceone@apple.com</td>
                    <td>Software</td>
                    <td>Los Altos</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
