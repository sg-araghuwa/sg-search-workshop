<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search App - Glassmorphism</title>
    <style>
        /* 
           Rationale: "Glassmorphism"
           - Inspired by the latest iOS/visionOS design trends.
           - Uses transparency and blurs to create a lightweight, airy feel.
           - Background "blobs" provide subtle color hints that interact with the UI elements.
           
           Hex Values:
           - Background: #F5F5F7 (Base)
           - Glass Card: rgba(255, 255, 255, 0.6)
           - Glass Border: rgba(255, 255, 255, 0.4)
           - Text (Primary): #1D1D1F
           - Text (Secondary): #424245
           - Accent: #BF5AF2 (Apple Purple - feels more modern/vibrant for glass)
           - Accent Hover: #AC4AD6
           - Blob 1: #FF375F (Apple Pink)
           - Blob 2: #5E5CE6 (Apple Indigo)
        */

        :root {
            --bg-base: #F5F5F7;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-primary: #1D1D1F;
            --text-secondary: #424245;
            --accent-color: #BF5AF2;
            --accent-hover: #AC4AD6;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Background Blobs */
        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .blob-1 { background: #FF375F; top: -100px; right: -100px; }
        .blob-2 { background: #5E5CE6; bottom: -100px; left: -100px; }

        .container {
            width: 100%;
            max-width: 1000px;
            z-index: 1;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 50px;
            text-align: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 40px;
            margin-bottom: 30px;
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 24px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        input {
            padding: 14px 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--accent-color);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-search {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(191, 90, 242, 0.3);
        }

        .btn-search:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-clear {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }

        .btn-clear:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .status-area {
            margin-bottom: 20px;
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
        }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .results-table th {
            text-align: left;
            padding: 16px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .results-table td {
            padding: 18px 20px;
            font-size: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover td {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <h1>Search App</h1>
        
        <div class="glass-panel">
            <div class="search-form">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="First Name">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Last Name">
                </div>
                <div class="button-group">
                    <button class="btn-search">Search</button>
                    <button class="btn-clear">Clear</button>
                </div>
            </div>
        </div>

        <div class="status-area">
            Found 3 results
        </div>

        <div class="glass-panel" style="padding: 0; overflow: hidden;">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>City</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>John</td>
                        <td>Appleseed</td>
                        <td>john@apple.com</td>
                        <td>Design</td>
                        <td>Cupertino</td>
                    </tr>
                    <tr>
                        <td>Jane</td>
                        <td>Doe</td>
                        <td>jane@example.com</td>
                        <td>Engineering</td>
                        <td>San Francisco</td>
                    </tr>
                    <tr>
                        <td>Craig</td>
                        <td>Federighi</td>
                        <td>hairforceone@apple.com</td>
                        <td>Software</td>
                        <td>Los Altos</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
