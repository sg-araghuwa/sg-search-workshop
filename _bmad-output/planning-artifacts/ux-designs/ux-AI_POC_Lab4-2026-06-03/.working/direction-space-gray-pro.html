<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search App - Space Gray Pro</title>
    <style>
        /* 
           Rationale: "Space Gray Pro"
           - Inspired by macOS Dark Mode and "Pro" software like Final Cut Pro or Xcode.
           - Focused on reducing eye strain and highlighting content through high contrast.
           - Uses deep grays and subtle gradients to create depth without clutter.
           
           Hex Values:
           - Background: #1D1D1F (Deep Black/Gray)
           - Card Background: #2D2D2F (Slightly lighter gray)
           - Text (Primary): #F5F5F7 (Light Gray/White)
           - Text (Secondary): #A1A1A6 (Muted Gray)
           - Border: #424245 (Dark Border)
           - Accent/Button: #0071E3 (Vibrant Apple Blue)
           - Button Hover: #147CE5
           - Table Header: #333336 (Darker surface)
        */

        :root {
            --bg-color: #1D1D1F;
            --card-bg: #2D2D2F;
            --text-primary: #F5F5F7;
            --text-secondary: #A1A1A6;
            --border-color: #424245;
            --accent-color: #0071E3;
            --accent-hover: #147CE5;
            --table-header-bg: #333336;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 30px;
            padding: 30px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input {
            padding: 12px 16px;
            font-size: 16px;
            background-color: #1D1D1F;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.3);
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-search {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-search:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-clear {
            background-color: #424245;
            color: var(--text-primary);
        }

        .btn-clear:hover {
            background-color: #515154;
        }

        .status-area {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .results-table th {
            background-color: var(--table-header-bg);
            text-align: left;
            padding: 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .results-table td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover {
            background-color: #38383A;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Search Pro</h1>
        
        <div class="search-form">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First Name">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name">
            </div>
            <div class="button-group">
                <button class="btn-search">Search</button>
                <button class="btn-clear">Clear</button>
            </div>
        </div>

        <div class="status-area">
            Searching...
        </div>

        <table class="results-table">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John</td>
                    <td>Appleseed</td>
                    <td>john@apple.com</td>
                    <td>Design</td>
                    <td>Cupertino</td>
                </tr>
                <tr>
                    <td>Jane</td>
                    <td>Doe</td>
                    <td>jane@example.com</td>
                    <td>Engineering</td>
                    <td>San Francisco</td>
                </tr>
                <tr>
                    <td>Craig</td>
                    <td>Federighi</td>
                    <td>hairforceone@apple.com</td>
                    <td>Software</td>
                    <td>Los Altos</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
